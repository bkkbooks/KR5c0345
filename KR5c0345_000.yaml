body:
  text: 玄霜掌上録夫玄霜者一名女玄霜二名瓊漿三名玉液四名地母乳五名甘露漿六名九轉隂丹七名醍醐酥自古神仙雖餌金丹無不修此隂丹且如黑鉛屬水其數一一生二二生三三能生萬物豈不因隂陽者哉夫大丹者是隂陽龍虎即生時龍虎及至修鍊了號為正陽如此即孤陽也既是孤陽不可立身須假隂丹而相負以為梯航也其數隨隂陽數用九也若論津潤五藏灌注華蓋上添泥丸下補精光大藥不得玄霜服久而難見其功大丹出於契中隂元玄霜出自袐籙所以術士難知也今具修隂丹白靈玄霜法取上好黑鉛一生者二斤汞半斤先於銚子中撲鉛令細絶灰便將汞投在鉛中熟攪瀉作碢子大小臨時用瓷瓶子一口表裏通油者便取上好醋五升貯在瓶內即於穩便房內又須明室向陽處下手制作假陽極之時當合道氣也便安瓶子於土坑內其口與地平將鉛堝安瓶口上更以紙三四重紙上又安瓷碗蓋之若是陽極時七日一度取出其碢上如垂雪倒懸見風良久自硬掃取後其瓶內醋損即須換如此重重取至一斤霜即於瓷碗內入甜漿水用柳木槌殺研漸漸入漿水如麵糊末在碗四面安在飰甑中蒸蒸了又研以清水淘澄乾又用清水殺研末在碗上土甑內又蒸又研淘准此法五度入飰甑四度入土甑蒸之其土甑蒸時碗口上別用一口碗合之如此九轉足即須用熟絹袋清水於銀器中擺過候一伏時却用清水濕綿蓋器口日內曬乾掃下又用柳木捶研了其色如春雪如麵勃其味甜淡甘美捻在口中冷如春冰若有人修得者以蜜丸如梧桐子大日服五丸至一嵗萬病不侵經夏不渴但洗頭生油調塗頂須㬰至腳心自冷神功難述若引大丹返老為少蓋由津液行也孫氏歌曰玄白霜玄白霜龍虎君中立為長萬物不從隂所生即問孤陽何處養玄霜掌上録
